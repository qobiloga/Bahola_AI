<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'qituvchi paneli — Bahola Ai</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <script src="../../assets/js/theme.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎓</text></svg>">
    <style>
        .form-control { width: 100%; padding: 10px 14px; background: var(--input-bg); border: 1px solid var(--surface-glass-border); color: var(--input-color); border-radius: 8px; font-family: inherit; margin-bottom: 12px; }
        .form-control:focus { outline: none; border-color: var(--accent-500); }
        .form-control option { background: var(--surface-card); }
        label { display: block; margin-bottom: 6px; color: var(--text-color); font-size: 14px; }
        .question-card { background: var(--surface-glass); border: 1px solid var(--surface-glass-border); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .q-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--error-400); cursor: pointer; font-size: 16px; }
        .opt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .opt-row input[type="radio"] { width: 18px; height: 18px; accent-color: var(--accent-500); cursor: pointer;}
        .opt-row .form-control { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="sidebar-logo">
                    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                        <rect width="32" height="32" rx="8" fill="url(#slg)"/>
                        <path d="M8 20L16 10L24 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs><linearGradient id="slg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                    </svg>
                    Bahola <span class="text-gradient">Ai</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Asosiy</div>
                    <a href="dashboard.html" class="sidebar-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        Dashboard
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Test</div>
                    <a href="tests.html" class="sidebar-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                        Testlarim
                        <span class="link-badge">3</span>
                    </a>
                    <a href="test-create.html" class="sidebar-link active">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        Yangi test
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Mustaqil ish</div>
                    <a href="assignments.html" class="sidebar-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                        Topshiriqlar
                        <span class="link-badge">5</span>
                    </a>
                    <a href="paper-check.html" class="sidebar-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        AI Tekshirish
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Analitika</div>
                    <a href="students.html" class="sidebar-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                        Talabalar
                    </a>
                    <a href="analytics.html" class="sidebar-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        Statistika
                    </a>
                </div>
            </nav>

            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">SR</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Sardor Raximov</div>
                    <div class="user-role">O'qituvchi</div>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Chiqish">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Top Bar -->
            <div class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div class="topbar-title">
                        <h2>Dashboard</h2>
                        <p>Xush kelibsiz, <span id="topbarName">Sardor</span>! 👋</p>
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="notification-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                        <span class="notification-dot"></span>
                    </button>
                </div>
            </div>

            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <form id="createTestForm">
                    <!-- General Settings -->
                    <div class="dashboard-card animate-fade-in-up delay-1">
                        <div class="dashboard-card-header">
                            <h3 class="dashboard-card-title">⚙️ Test sozlamalari</h3>
                        </div>
                        <div class="dashboard-card-body">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div>
                                    <label>Test nomi:</label>
                                    <input type="text" id="testTitle" class="form-control" required placeholder="Masalan: Informatika yakuniy nazorat...">
                                </div>
                                <div>
                                    <label>Fanni tanlang:</label>
                                    <select id="testSubject" class="form-control" required>
                                        <option value="">Yuklanmoqda...</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label>Vaqt (daqiqa):</label>
                                <input type="number" id="testTime" class="form-control" value="30" required style="width: 150px;">
                            </div>
                        </div>
                    </div>

                    <!-- Questions Area -->
                    <div class="dashboard-card animate-fade-in-up delay-2">
                        <div class="dashboard-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <h3 class="dashboard-card-title">❓ Savollar</h3>
                            <button type="button" class="btn btn-sm btn-secondary" id="addQuestionBtn">+ Savol qo'shish</button>
                        </div>
                        <div class="dashboard-card-body" id="questionsContainer">
                            <!-- Questions will be injected here -->
                        </div>
                    </div>

                    <!-- Submit -->
                    <div style="text-align: right; margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" id="saveTestBtn" style="padding: 12px 24px; font-size: 16px;">
                            ✅ Testni Saqlash
                        </button>
                    </div>
                    <div id="testResult" style="margin-top: 15px; text-align: right;"></div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Load user data
        const user = JSON.parse(localStorage.getItem('smartedu_user') || '{}');
        if (user.name) {
            document.getElementById('userName').textContent = user.name;
            document.getElementById('topbarName').textContent = user.name.split(' ')[0];
            document.getElementById('userAvatar').textContent = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
        }

        // Sidebar toggle
        document.getElementById('sidebarToggle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('smartedu_user');
            window.location.href = '../auth/login.html';
        });

        // Auth check
        if (!user.id) {
            window.location.href = '../auth/login.html';
        } else {
            loadDashboardData();
        }

        if (!user.id) {
            window.location.href = '../auth/login.html';
        } else {
            loadOptions();
        }

        async function loadOptions() {
            try {
                const res = await fetch(`../../api/teacher/options.php?teacher_id=${user.id || 1}`);
                const data = await res.json();
                if(data.success) {
                    const subjSelect = document.getElementById('testSubject');
                    if(data.subjects.length > 0) {
                        subjSelect.innerHTML = data.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                    } else {
                        subjSelect.innerHTML = `<option value="">Sizda hali fanlar yo'q</option>`;
                    }
                }
            } catch(e) { console.error(e); }
        }

        // Questions Logic
        const qContainer = document.getElementById('questionsContainer');
        let qCount = 0;

        function addQuestion() {
            qCount++;
            const div = document.createElement('div');
            div.className = 'question-card animate-fade-in-up';
            div.id = `qCard_${qCount}`;
            div.innerHTML = `
                <button type="button" class="q-delete" onclick="document.getElementById('qCard_${qCount}').remove()">✕</button>
                <div style="margin-bottom: 15px;">
                    <label><strong>${qCount}-savol:</strong></label>
                    <textarea class="form-control q-text" rows="2" required placeholder="Savol matnini kiriting..."></textarea>
                </div>
                <div class="q-options">
                    <label style="font-size: 12px; color: var(--accent-400);">To'g'ri javobni belgilash uchun dumaloqni bosing</label>
                    <!-- 4 options default -->
                    ${[1,2,3,4].map(i => `
                    <div class="opt-row">
                        <input type="radio" name="correct_${qCount}" value="${i-1}" ${i===1?'checked':''} title="To'g'ri javobni belgilang">
                        <input type="text" class="form-control opt-text" required placeholder="Variant ${i}">
                    </div>`).join('')}
                </div>
            `;
            qContainer.appendChild(div);
        }
        
        document.getElementById('addQuestionBtn').addEventListener('click', addQuestion);

        // Add first question automatically
        addQuestion();

        // Submit form
        document.getElementById('createTestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('testResult');
            const submitBtn = document.getElementById('saveTestBtn');
            resultDiv.innerHTML = '';
            
            // Gather data
            const title = document.getElementById('testTitle').value.trim();
            const subject_id = document.getElementById('testSubject').value;
            const time_limit = document.getElementById('testTime').value;

            // Gather questions
            const qCards = qContainer.querySelectorAll('.question-card');
            if(qCards.length === 0) {
                resultDiv.innerHTML = `<span style="color:var(--error-400)">Kamida bitta savol qo'shing!</span>`;
                return;
            }

            const questionsArr = [];
            for (let card of qCards) {
                const text = card.querySelector('.q-text').value.trim();
                const optInputs = card.querySelectorAll('.opt-text');
                const radioInputs = card.querySelectorAll('input[type="radio"]');
                let correctIdx = 0;
                
                let opts = [];
                optInputs.forEach((inp, idx) => {
                    opts.push(inp.value.trim());
                    if(radioInputs[idx].checked) correctIdx = idx;
                });

                questionsArr.push({
                    question_text: text,
                    options: opts,
                    correct_index: correctIdx
                });
            }

            // Post
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saqlanmoqda...';

            try {
                const response = await fetch('../../api/teacher/add-test.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        teacher_id: user.id || 1,
                        title: title,
                        subject_id: subject_id,
                        time_limit: time_limit,
                        questions: questionsArr
                    })
                });
                const result = await response.json();
                if(result.success) {
                    resultDiv.innerHTML = `<span style="color:var(--accent-400)">🎉 ${result.message}</span>`;
                    setTimeout(() => window.location.href = 'tests.html', 1500); // Redirect back
                } else {
                    resultDiv.innerHTML = `<span style="color:var(--error-400)">❌ Xatolik: ${result.error}</span>`;
                }
            } catch(err) {
                resultDiv.innerHTML = `<span style="color:var(--error-400)">❌ Tizim xatosi!</span>`;
            }
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✅ Testni Saqlash';
        });
    </script>
</body>
</html>
